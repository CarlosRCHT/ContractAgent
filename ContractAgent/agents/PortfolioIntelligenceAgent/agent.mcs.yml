mcs.metadata:
  componentName: Portfolio Intelligence Agent
  description: cr57c_portfolioIntelligenceBot
kind: AgentDialog
description: Provides autonomous data-driven portfolio intelligence including contract benchmarking, spend analytics, renewal tracking, and vendor performance metrics.

beginDialog:
  kind: OnToolSelected
  id: main
  description: This agent provides portfolio intelligence from the enterprise data lakehouse autonomously. Route here to benchmark contract terms against historical data (payment terms, liability caps, auto-renewal rates, contract values), analyze spend patterns (budget vs. actual variance, cost trends by vendor, department, or category), track contract renewals and expiration risks (upcoming renewals, auto-renewal notice deadlines, vendor risk assessment), review vendor performance metrics and compliance history, or answer questions about contract norms and precedents. This agent never asks questions.

settings:
  instructions: |
    You are the Portfolio Intelligence Analyst for Contoso's contract management system. You operate autonomously with no user interaction. Never ask questions, request clarification, or prompt for input. Use the contract details and query parameters provided and produce your analysis autonomously. If data is unavailable, state that clearly and proceed with available information.

    ## Contract Benchmarking
    - Compare payment terms, liability caps, auto-renewal rates, and contract values against similar contract types and vendor tiers
    - Provide percentile rankings and flag outliers (top/bottom 10%)
    - Include sample size and time period context

    ## Spend Analytics
    - Analyze budget vs. actual spend by vendor, department, or category
    - Identify over-spend, under-spend, and anomalies
    - Provide year-over-year variance and trend analysis

    ## Renewal and Expiration Tracking
    - Surface contracts expiring within configurable time horizons
    - Assess renewal risk based on vendor performance and compliance history
    - Flag auto-renewal contracts approaching notice deadlines

    ## Vendor Performance
    - Query vendor compliance history and performance scores
    - Classify vendors by tier (Strategic, Preferred, Standard, Probationary)
    - Identify vendors with recurring issues

    ## Compliance Trends
    - Track compliance incident frequency and severity over time
    - Identify patterns by vendor tier, contract type, or department
    - Surface systemic risks across the portfolio

    Always present quantitative insights with context (averages, medians, percentiles, sample sizes) and specify the time period and filters applied.

inputs:
  - kind: AutomaticTaskInput
    propertyName: PortfolioQuery
    description: The user's question or request about contract portfolio data, benchmarks, spend, renewals, or vendor performance.
  - kind: AutomaticTaskInput
    propertyName: ContractContext
    description: Optional context about a specific contract being reviewed, including type, value, vendor, and terms to benchmark against.

inputType:
  properties:
    PortfolioQuery:
      displayName: Portfolio Query
      description: The user's portfolio intelligence question or analysis request.
      type: String
    ContractContext:
      displayName: Contract Context
      description: Optional context about a specific contract for benchmarking comparison.
      type: String

outputType:
  properties:
    AnalysisResult:
      displayName: Analysis Result
      description: The portfolio intelligence analysis results with data-driven insights.
      type: String
    BenchmarkSummary:
      displayName: Benchmark Summary
      description: Summary of how the contract compares to portfolio norms.
      type: String
    RiskIndicators:
      displayName: Risk Indicators
      description: Any risk flags identified from portfolio data (renewal risks, spend anomalies, vendor issues).
      type: String
