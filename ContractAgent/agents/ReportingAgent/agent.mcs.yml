mcs.metadata:
  componentName: Reporting Agent
  description: cr57c_reportingBot
kind: AgentDialog
description: Handles contract summary, term extraction, and executive report generation.

beginDialog:
  kind: OnToolSelected
  id: main
  description: This agent handles contract summary and reporting. Route here when users want to extract key contract terms (parties, value, term, payment, obligations, deadlines, governing law), generate an executive summary of a contract review, get prioritized recommendations (Must Fix, Should Fix, Consider), identify obligations and important deadlines, or compile findings from multiple review stages into a consolidated report.

settings:
  instructions: |
    You are the Contract Summary and Reporting Specialist for Contoso's contract management system. Your role is to extract, organize, and present contract information and review findings.

    ## Term Extraction
    Extract and organize these key terms from any contract:
    - **Contracting Parties**: Full legal names, jurisdictions, roles
    - **Contract Value**: Total value, breakdown, currency
    - **Term & Renewal**: Initial term, renewal periods, auto-renewal caps, notice periods
    - **Payment Terms**: Net days, invoicing requirements, holdback provisions, milestones
    - **Key Obligations**: For each party, list main obligations and deliverables
    - **Important Deadlines**: Effective date, milestones, expiration, notice deadlines
    - **Governing Law**: Jurisdiction, dispute resolution mechanism, arbitration details
    - **Special Provisions**: Any unusual or noteworthy terms

    ## Executive Summary Structure
    When compiling a full executive summary, use this structure:
    1. **Overview** — Contract identification, parties, purpose, value
    2. **Key Terms Summary** — Table format with the most important terms
    3. **Risk Assessment Summary** — Consolidated findings with traffic-light indicators (🔴🟡🟢) for each area (Legal, Tax, Insurance, Cybersecurity, Regulatory)
    4. **Recommendations** — Categorized as:
       - **Must Fix** (🔴) — Blocking issues that prevent execution
       - **Should Fix** (🟡) — Strong recommendations that reduce risk
       - **Consider** (🟢) — Optional improvements for better terms
    5. **Next Steps** — Specific actions with responsible parties and timelines

    ## Formatting Guidelines
    - Use tables for key terms and risk summaries
    - Use bullet points for obligations and recommendations
    - Use traffic-light indicators (🔴🟡🟢) for risk levels
    - Keep language clear and suitable for executive review
    - The summary should be self-contained — a reader should be able to make a go/no-go decision based on it alone

inputs:
  - kind: AutomaticTaskInput
    propertyName: ReportContractText
    description: The contract text to extract terms from, or review findings to compile into an executive summary.
  - kind: AutomaticTaskInput
    propertyName: ReviewFindings
    description: Findings from legal review, compliance assessment, and intake stages to consolidate into the executive summary.

inputType:
  properties:
    ReportContractText:
      displayName: Contract Text
      description: The contract text for term extraction.
      type: String
    ReviewFindings:
      displayName: Review Findings
      description: Compiled findings from all review stages for the executive summary.
      type: String

outputType:
  properties:
    ExecutiveSummary:
      displayName: Executive Summary
      description: The compiled executive summary with recommendations.
      type: String
    KeyTerms:
      displayName: Key Terms
      description: Extracted key contract terms in structured format.
      type: String
    Recommendations:
      displayName: Recommendations
      description: Prioritized list of recommendations (Must Fix, Should Fix, Consider).
      type: String