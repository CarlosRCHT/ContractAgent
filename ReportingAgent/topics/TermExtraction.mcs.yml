mcs.metadata:
  componentName: Term Extraction
  description: Extracts key contract terms including parties, value, obligations, and deadlines.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Term Extraction
    triggerQueries:
      - Extract contract terms
      - What are the key terms in this contract
      - Pull out contract details
      - Summarize contract terms
      - List the key provisions
      - What are the main terms
      - Extract parties and obligations
      - Contract term extraction
      - What does this contract say
      - Identify contract details

  actions:
    - kind: SendActivity
      id: sendMessage_termIntro
      activity: I'll extract and organize the key terms from your contract. Please provide the contract text.

    - kind: Question
      id: question_contractText
      variable: init:Topic.ContractText
      prompt: "Please paste the contract text or the key sections you'd like me to analyze. I'll extract: parties, value, term, payment, obligations, deadlines, and governing law."
      entity: StringPrebuiltEntity

    - kind: SearchAndSummarizeContent
      id: search_termExtract
      userInput: "Extract and organize the following key terms from this contract text. Present the results in a structured format with these sections: 1. Contracting Parties (full legal names, jurisdictions, roles) 2. Contract Value (total value, breakdown, currency) 3. Term and Renewal (initial term, renewal periods, auto-renewal provisions, notice periods) 4. Payment Terms (net days, invoicing requirements, holdback, milestones) 5. Key Obligations (for each party, list main obligations and deliverables) 6. Important Deadlines (effective date, milestones, expiration, notice deadlines) 7. Governing Law and Dispute Resolution (jurisdiction, arbitration, escalation) 8. Special Provisions (any unusual or noteworthy terms) Contract text: {Topic.ContractText}"
      variable: Topic.ExtractedTerms

    - kind: ConditionGroup
      id: conditionGroup_hasTerms
      conditions:
        - id: conditionItem_hasExtraction
          condition: =!IsBlank(Topic.ExtractedTerms)
          actions:
            - kind: SendActivity
              id: sendMessage_extractedTerms
              activity: "## 📊 Extracted Contract Terms\n\n{Topic.ExtractedTerms}\n\n---\nThese extracted terms can be used as input for the executive summary. Would you like me to generate a full executive summary report?"

      elseActions:
        - kind: SendActivity
          id: sendMessage_manualExtraction
          activity: "I'll analyze the contract text you provided. Here are the key areas I'm extracting:\n\n**Extraction Framework:**\n| Category | Details |\n|----------|---------|\n| Parties | Legal names, jurisdictions, roles |\n| Value | Total, breakdown, currency |\n| Term | Initial, renewal, auto-renewal |\n| Payment | Net days, holdback, milestones |\n| Obligations | By party, deliverables |\n| Deadlines | Key dates, notice periods |\n| Governing Law | Jurisdiction, dispute resolution |\n\nPlease provide the full contract text for a comprehensive extraction, or ask about specific sections."

    - kind: EndDialog
      id: endDialog_terms
