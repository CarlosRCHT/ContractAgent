mcs.metadata:
  componentName: Contract Classification
  description: Classifies contracts by type and collects key metadata.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Contract Classification
    triggerQueries:
      - Classify a contract
      - What type of contract is this
      - Submit a new contract
      - I have a new contract to review
      - Contract intake
      - New contract submission
      - Categorize this contract
      - What kind of contract do I have
      - Help me classify this agreement
      - I need to submit a contract for review

  actions:
    - kind: SendActivity
      id: sendMessage_classIntro
      activity: I'll help you classify this contract. Let me collect some key information to determine the contract type and route it appropriately.

    - kind: Question
      id: question_contractDesc
      variable: init:Topic.ContractDescription
      prompt: Please describe the contract or paste the key terms. What is the primary purpose of this agreement?
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_contractType
      variable: init:Topic.ContractType
      prompt: "Based on your description, which contract type best fits? Please enter one: vendor, customer, nda, partnership, or maintenance."
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_parties
      variable: init:Topic.ContractingParties
      prompt: Who are the contracting parties? Please provide the full legal names of all parties involved.
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_value
      variable: init:Topic.ContractValue
      prompt: What is the estimated contract value in local currency?
      entity: NumberPrebuiltEntity

    - kind: Question
      id: question_term
      variable: init:Topic.ContractTerm
      prompt: What is the proposed contract term? (e.g., 1 year, 2 years, 36 months)
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_jurisdiction
      variable: init:Topic.Jurisdiction
      prompt: What is the governing jurisdiction for this contract? (e.g., applicable jurisdiction)
      entity: StringPrebuiltEntity

    - kind: SetVariable
      id: setVariable_reviewTeams
      variable: init:Topic.ReviewTeams
      value: "=If(Topic.ContractType = \"nda\", \"Legal\", If(Topic.ContractValue > 100000, \"Legal, Tax, Insurance\", \"Legal\"))"

    - kind: SendActivity
      id: sendMessage_classResult
      activity: "## 📋 Contract Classification Results\n\n**Contract Type:** {Topic.ContractType}\n**Contracting Parties:** {Topic.ContractingParties}\n**Estimated Value:** ${Topic.ContractValue}\n**Term:** {Topic.ContractTerm}\n**Jurisdiction:** {Topic.Jurisdiction}\n\n**Required Review Teams:** {Topic.ReviewTeams}\n\n---\nThis contract has been classified and is ready for routing to the appropriate review teams. The orchestrator will coordinate the next steps with the Legal Review, Compliance, and Reporting agents as needed."

    - kind: EndDialog
      id: endDialog_class
