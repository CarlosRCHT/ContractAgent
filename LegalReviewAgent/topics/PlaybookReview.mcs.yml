mcs.metadata:
  componentName: Playbook Review
  description: Reviews contract clauses against Contoso's legal playbook and approved templates.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Playbook Review
    triggerQueries:
      - Review contract against playbook
      - Compare contract to template
      - Legal playbook review
      - Check contract clauses
      - Review contract language
      - Does this contract match the template
      - Check for non-standard clauses
      - Review against approved language
      - Playbook compliance check
      - Template comparison review

  actions:
    - kind: SendActivity
      id: sendMessage_playbookIntro
      activity: I'll review your contract clause by clause against Contoso's legal playbook and approved templates. Let me gather the contract details.

    - kind: Question
      id: question_contractType
      variable: init:Topic.ContractType
      prompt: "What type of contract is this? Please enter one: vendor, customer, nda_mutual, nda_unilateral, partnership, or maintenance."
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_contractText
      variable: init:Topic.ContractText
      prompt: "Please paste the contract text or key clauses you'd like reviewed. Focus on: liability, indemnification, termination, IP rights, confidentiality, and data protection clauses."
      entity: StringPrebuiltEntity

    - kind: SearchAndSummarizeContent
      id: search_playbook
      userInput: "Review the following contract clauses against Contoso's legal playbook and approved templates for a {Topic.ContractType}. Identify all deviations from approved language, classify each as Major, Moderate, or Minor risk, check for prohibited terms (unlimited liability, auto-renewal exceeding 3 years, exclusive dealing without board approval, non-compete exceeding 2 years), and suggest approved alternative language for any flagged clauses. Contract text: {Topic.ContractText}"
      variable: Topic.PlaybookAnalysis

    - kind: ConditionGroup
      id: conditionGroup_hasAnalysis
      conditions:
        - id: conditionItem_hasResult
          condition: =!IsBlank(Topic.PlaybookAnalysis)
          actions:
            - kind: SendActivity
              id: sendMessage_analysisResult
              activity: "## 📖 Legal Playbook Review Results\n\n**Contract Type:** {Topic.ContractType}\n\n{Topic.PlaybookAnalysis}\n\n---\nIf any **Major Risk** items were identified, VP Legal approval is required before the contract can proceed. **Moderate Risk** items require Senior Counsel review. **Minor Risk** items can be accepted with notation."

      elseActions:
        - kind: SendActivity
          id: sendMessage_manualReview
          activity: "I've reviewed the contract clauses you provided against Contoso's legal standards. Here is my assessment based on the legal playbook:\n\n**Key Review Areas:**\n1. **Liability & Indemnification** — Checking for unlimited liability, mutual vs. one-sided indemnification, and proper caps\n2. **Term & Renewal** — Verifying auto-renewal does not exceed 3 years, proper notice periods\n3. **Termination** — Ensuring proper cure periods, termination for convenience rights\n4. **IP Rights** — Confirming work product ownership, license provisions\n5. **Confidentiality** — Checking survival period, scope of obligations\n6. **Data Protection** — data privacy compliance, data residency requirements\n\nPlease provide specific clauses for detailed deviation analysis, or ask me about any particular area of concern."

    - kind: EndDialog
      id: endDialog_playbook
