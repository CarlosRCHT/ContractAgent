mcs.metadata:
  componentName: Risk Assessment
  description: Flags clause deviations and rates risk levels for contract clauses.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Risk Assessment
    triggerQueries:
      - Assess contract risk
      - What are the risks in this contract
      - Flag risky clauses
      - Risk level assessment
      - Check for prohibited terms
      - Identify contract risks
      - Rate the risk of these clauses
      - Are there any red flags in this contract
      - Legal risk analysis
      - Check for dangerous contract language

  actions:
    - kind: SendActivity
      id: sendMessage_riskIntro
      activity: I'll perform a comprehensive risk assessment on your contract, checking for prohibited terms, risky clauses, and deviations from Contoso's approved positions.

    - kind: Question
      id: question_clauseText
      variable: init:Topic.ClauseText
      prompt: Please paste the contract clauses or sections you'd like assessed for risk. I'll check for prohibited terms, evaluate risk levels, and provide recommendations.
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_contractValue
      variable: init:Topic.ContractValue
      prompt: What is the contract value in local currency? This affects risk thresholds.
      entity: NumberPrebuiltEntity

    - kind: SearchAndSummarizeContent
      id: search_riskCheck
      userInput: "Perform a legal risk assessment on the following contract clauses for Contoso. Check for these prohibited terms: unlimited liability, auto-renewal exceeding 3 years, exclusive dealing without board approval, non-compete clauses exceeding 2 years, waiver of jury trial, assignment without consent, unilateral price increases. Classify each finding as Major Risk (requires VP Legal approval), Moderate Risk (requires Senior Counsel review), or Minor Risk (acceptable with notation). Contract value is {Topic.ContractValue}. Clauses to review: {Topic.ClauseText}"
      variable: Topic.RiskAnalysis

    - kind: ConditionGroup
      id: conditionGroup_hasRisk
      conditions:
        - id: conditionItem_hasRiskResult
          condition: =!IsBlank(Topic.RiskAnalysis)
          actions:
            - kind: SendActivity
              id: sendMessage_riskResult
              activity: "## ⚠️ Legal Risk Assessment\n\n**Contract Value:** ${Topic.ContractValue}\n\n{Topic.RiskAnalysis}\n\n---\n**Escalation Matrix:**\n- 🔴 **Major Risk** → VP Legal approval required (15 business day SLA)\n- 🟡 **Moderate Risk** → Senior Counsel review required (10 business day SLA)\n- 🟢 **Minor Risk** → Accept with notation in review file (5 business day SLA)"

      elseActions:
        - kind: SendActivity
          id: sendMessage_generalRisk
          activity: "Based on my review of the clauses provided, here is my risk assessment framework:\n\n**Prohibited Terms Checklist:**\n- ❌ Unlimited liability — Not found / Found\n- ❌ Auto-renewal > 3 years — Not found / Found\n- ❌ Exclusive dealing without board approval — Not found / Found\n- ❌ Non-compete > 2 years — Not found / Found\n- ❌ Unilateral price increases — Not found / Found\n\nPlease provide the specific contract clauses for a detailed risk-by-risk analysis with approved alternative language."

    - kind: EndDialog
      id: endDialog_risk
