mcs.metadata:
  componentName: Tax Compliance
  description: Verifies domestic tax obligations and cross-border tax implications.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Tax Compliance
    triggerQueries:
      - Check tax compliance
      - Tax review for contract
      - Verify tax obligations
      - Cross-border tax implications
      - Transfer pricing review
      - Sales tax requirements
      - Withholding tax check
      - Tax compliance verification
      - Does this contract meet tax requirements
      - Domestic tax obligations

  actions:
    - kind: SendActivity
      id: sendMessage_taxIntro
      activity: I'll verify the tax compliance requirements for your contract. Let me gather the relevant details.

    - kind: Question
      id: question_vendorLocation
      variable: init:Topic.VendorLocation
      prompt: "Where is the vendor/counterparty located? Please enter one: domestic, us, eu, uk, or other."
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_contractValue
      variable: init:Topic.ContractValue
      prompt: What is the contract value in local currency?
      entity: NumberPrebuiltEntity

    - kind: Question
      id: question_serviceType
      variable: init:Topic.ServiceType
      prompt: What type of services or goods are covered? (e.g., IT services, consulting, maintenance, equipment, software licensing)
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_relatedParty
      variable: init:Topic.IsRelatedParty
      prompt: Is this a related-party or intercompany transaction?
      entity: BooleanPrebuiltEntity

    - kind: ConditionGroup
      id: conditionGroup_location
      conditions:
        - id: conditionItem_canada
          condition: =Topic.VendorLocation = "domestic"
          actions:
            - kind: SendActivity
              id: sendMessage_canadaTax
              activity: "## 💰 Tax Compliance Assessment — Domestic Vendor\n\n**Vendor Location:** Domestic\n**Contract Value:** ${Topic.ContractValue}\n**Service Type:** {Topic.ServiceType}\n\n**Sales Tax Requirements:**\n- ✅ Vendor must provide valid sales tax registration number\n- ✅ Invoices must include sales tax breakdown\n- ✅ Input tax credits may be claimed by the organization\n\n**Regional Sales Tax Requirements (if applicable):**\n- ⚠️ Verify Regional sales tax registration for local vendors\n- ⚠️ Separate regional sales tax line item required on invoices\n\n**Withholding Tax:** Not applicable for domestic resident vendors\n\n**Status:** 🟢 Standard domestic tax treatment applies"

        - id: conditionItem_international
          condition: =Topic.VendorLocation <> "domestic"
          actions:
            - kind: SendActivity
              id: sendMessage_intlTax
              activity: "## 💰 Tax Compliance Assessment — International Vendor\n\n**Vendor Location:** {Topic.VendorLocation}\n**Contract Value:** ${Topic.ContractValue}\n**Service Type:** {Topic.ServiceType}\n\n**Cross-Border Tax Implications:**\n- ⚠️ Withholding tax may apply (typically 25%, reduced by treaty)\n- ⚠️ Tax residency certificate required from vendor\n- ⚠️ Permanent establishment risk must be assessed\n- ⚠️ Treaty benefits should be documented\n\n**VAT/Sales Tax:**\n- ⚠️ Review VAT obligations in vendor's jurisdiction\n- ⚠️ Reverse charge mechanism may apply\n\n**Customs & Import:**\n- ⚠️ Customs duties assessment required for goods contracts\n- ⚠️ Import tax implications to be reviewed\n\n**Status:** 🟡 Cross-border review required — Tax department consultation recommended"

    - kind: ConditionGroup
      id: conditionGroup_relatedParty
      conditions:
        - id: conditionItem_isRelated
          condition: =Topic.IsRelatedParty = true
          actions:
            - kind: SendActivity
              id: sendMessage_transferPricing
              activity: "**⚠️ Transfer Pricing Alert:**\nThis is a related-party transaction. Additional requirements:\n- Transfer pricing documentation must be prepared\n- Arm's length pricing must be confirmed and documented\n- Country-by-country reporting requirements apply\n- Consider advance pricing agreement (APA) for amounts over $1,000,000\n\n**Status:** 🟡 Transfer pricing review required"

    - kind: EndDialog
      id: endDialog_tax
