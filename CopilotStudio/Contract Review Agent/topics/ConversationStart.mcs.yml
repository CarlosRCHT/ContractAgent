mcs.metadata:
  componentName: Conversation Start
  description: Welcomes users to Air Canada's Contract Management system and explains available capabilities.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - >-
            ✈️ Welcome to **Air Canada Contract Management**!


            I'm your contract review orchestrator. I coordinate a team of
            specialized AI agents to provide comprehensive contract review
            services:


            📋 **Contract Intake & Triage** — Classify contracts, assess
            urgency, and route to review teams

            ⚖️ **Legal Review** — Review clauses against our legal playbook
            and flag deviations

            🛡️ **Compliance & Risk** — Verify tax, insurance, cybersecurity,
            and regulatory compliance

            📊 **Summary & Reporting** — Extract key terms and generate
            executive summaries


            **How can I help you today?** You can:

            - Submit a new contract for full review

            - Check compliance requirements for a specific contract

            - Get an executive summary of review findings

            - Review specific clauses against the legal playbook

            - Assess the urgency and priority of a contract
        speak:
          - >-
            Welcome to Air Canada Contract Management. I coordinate
            specialized agents to help you with contract intake, legal
            review, compliance assessment, and executive reporting. How
            can I help you today?