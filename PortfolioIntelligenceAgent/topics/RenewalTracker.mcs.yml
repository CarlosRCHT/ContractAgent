mcs.metadata:
  componentName: Renewal Tracker
  description: Tracks contract renewals, identifies expiring contracts, assesses vendor risk based on compliance history and performance scores.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Renewal Tracker
    triggerQueries:
      - Expiring contracts
      - Renewal risk
      - Upcoming renewals
      - Contract expiry
      - Auto-renewal
      - Vendor risk
      - What contracts are expiring soon
      - Show me renewal calendar
      - Which vendors are up for renewal
      - Contracts expiring next quarter

  actions:
    - kind: SendActivity
      id: sendMessage_renewalIntro
      activity: I'll check the contract portfolio for upcoming renewals and assess associated risks. Let me understand your focus area.

    - kind: Question
      id: question_timeHorizon
      variable: init:Topic.TimeHorizon
      prompt: "What time horizon would you like to review? Please enter one: 30 days, 60 days, 90 days, next quarter, or next 6 months. You can also enter a specific vendor name to see their renewal status."
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_riskFilter
      variable: init:Topic.RiskFilter
      prompt: "Would you like to filter by risk level? Please enter one: high-risk (vendors with compliance issues or low performance), auto-renewal (contracts with auto-renewal approaching notice deadline), all (show everything), or a specific vendor name."
      entity: StringPrebuiltEntity

    - kind: SearchAndSummarizeContent
      id: search_renewals
      userInput: "Query the contract renewal pipeline from Contoso's enterprise data lakehouse. Time horizon: {Topic.TimeHorizon}. Filter: {Topic.RiskFilter}. For each expiring contract, provide: contract name, vendor, expiration date, contract value, auto-renewal status, notice deadline, vendor performance score, compliance history summary, and overall renewal risk rating (High, Medium, Low). Sort by risk level descending, then by expiration date ascending. Flag any auto-renewal contracts where the notice deadline is within 30 days."
      variable: Topic.RenewalAnalysis

    - kind: ConditionGroup
      id: conditionGroup_hasRenewals
      conditions:
        - id: conditionItem_hasRenewalResult
          condition: =!IsBlank(Topic.RenewalAnalysis)
          actions:
            - kind: SendActivity
              id: sendMessage_renewalResult
              activity: "## 🔄 Contract Renewal Tracker\n\n**Time Horizon:** {Topic.TimeHorizon}\n**Filter:** {Topic.RiskFilter}\n\n{Topic.RenewalAnalysis}\n\n---\n**Risk Indicators:**\n- 🔴 **High Risk** — Vendor compliance issues, low performance score, or auto-renewal notice deadline within 30 days\n- 🟡 **Medium Risk** — Minor compliance gaps or approaching notice deadline\n- 🟢 **Low Risk** — Good vendor performance, no compliance issues\n\n⚠️ **Action Required:** Review all high-risk renewals with procurement and legal teams before the notice deadline."

      elseActions:
        - kind: SendActivity
          id: sendMessage_renewalFallback
          activity: "I was unable to retrieve specific renewal data for this query. Here is the general renewal tracking framework:\n\n**Renewal Risk Assessment Factors:**\n- **Vendor Performance Score** — Based on delivery quality, SLA adherence, and responsiveness\n- **Compliance History** — Number and severity of compliance incidents\n- **Strategic Alignment** — Whether the vendor is still aligned with business needs\n- **Market Alternatives** — Availability of alternative vendors\n- **Auto-Renewal Terms** — Notice period requirements and deadlines\n\nPlease refine your query with a specific time horizon or vendor name for targeted results."

    - kind: EndDialog
      id: endDialog_renewal
