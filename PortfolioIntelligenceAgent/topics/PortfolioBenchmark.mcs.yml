mcs.metadata:
  componentName: Portfolio Benchmark
  description: Benchmarks a contract's key terms against the historical portfolio. Compares payment terms, liability caps, auto-renewal rates, and contract values against similar contract types and vendor tiers.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Portfolio Benchmark
    triggerQueries:
      - Benchmark contract
      - Compare terms
      - Similar contracts
      - What's typical
      - Market comparison
      - Payment term average
      - Standard liability cap
      - How does this compare to other contracts
      - What's the norm for payment terms
      - Average contract value for this type

  actions:
    - kind: SendActivity
      id: sendMessage_benchIntro
      activity: I'll benchmark your contract terms against our historical portfolio data. Let me gather the details to run the comparison.

    - kind: Question
      id: question_contractType
      variable: init:Topic.ContractType
      prompt: "What type of contract are you benchmarking? Please enter one: vendor, customer, nda, partnership, or maintenance."
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_benchmarkTerm
      variable: init:Topic.BenchmarkTerm
      prompt: "Which term or area would you like to benchmark? For example: payment terms, liability cap, contract value, auto-renewal rate, termination notice period, or all for a comprehensive comparison."
      entity: StringPrebuiltEntity

    - kind: Question
      id: question_vendorTier
      variable: init:Topic.VendorTier
      prompt: "What is the vendor tier? Please enter one: strategic, preferred, standard, probationary, or unknown."
      entity: StringPrebuiltEntity

    - kind: SearchAndSummarizeContent
      id: search_benchmark
      userInput: "Benchmark the following contract against Contoso's historical portfolio data from the enterprise data lakehouse. Contract type: {Topic.ContractType}. Vendor tier: {Topic.VendorTier}. Term to benchmark: {Topic.BenchmarkTerm}. Provide comparisons including averages, medians, percentile rankings, and outlier analysis. Include sample size and time period for the data. Highlight where this contract's terms fall relative to the portfolio norm — flag any terms in the top or bottom 10% as outliers requiring attention."
      variable: Topic.BenchmarkAnalysis

    - kind: ConditionGroup
      id: conditionGroup_hasBenchmark
      conditions:
        - id: conditionItem_hasResult
          condition: =!IsBlank(Topic.BenchmarkAnalysis)
          actions:
            - kind: SendActivity
              id: sendMessage_benchResult
              activity: "## 📊 Portfolio Benchmark Results\n\n**Contract Type:** {Topic.ContractType}\n**Vendor Tier:** {Topic.VendorTier}\n**Benchmarked Term:** {Topic.BenchmarkTerm}\n\n{Topic.BenchmarkAnalysis}\n\n---\n**How to interpret:** Values in the top or bottom 10% are flagged as outliers. Consider renegotiating terms that significantly deviate from portfolio norms unless there is a documented business justification."

      elseActions:
        - kind: SendActivity
          id: sendMessage_benchFallback
          activity: "I was unable to retrieve specific benchmark data for this query. Here is the general framework I use for benchmarking:\n\n**Key Benchmark Metrics:**\n- **Payment Terms** — Portfolio average varies by vendor tier (Strategic: Net 45, Preferred: Net 30, Standard: Net 30)\n- **Liability Caps** — Typically 1x-2x annual contract value for standard agreements\n- **Auto-Renewal Rates** — Approximately 65% of active contracts include auto-renewal clauses\n- **Termination Notice** — Most common is 90 days for annual contracts\n\nPlease refine your query or provide specific contract values for a detailed comparison."

    - kind: EndDialog
      id: endDialog_benchmark
